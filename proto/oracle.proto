syntax = "proto3";

package oracle;

option go_package = "github.com/my-oracle/proto;oracle";

service Aggregator {
  rpc SubmitReport (NodeReport) returns (SubmitResponse) {}
}

message NodeReport {
  bytes req_id = 1;
  uint64 price = 2;
  bytes signature = 3;
  string node_address = 4;
}

message SubmitResponse {
  bool success = 1;
  string message = 2;
}
